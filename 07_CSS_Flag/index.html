<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
  /*
      "position: absolute" ориентируется на ближайшего предка (!),
      у которого позиционирование НЕ "static" (!) (то есть "relative", "absolute", "fixed", "sticky").
  */
    .flag {
        width: 900px;
        height: 600px;
        background-color: rgb(206, 17, 38);
        position: relative;
    }
    
    p {
        font-size: 5rem;
        text-align: center;
        margin: 0;
        padding: 0;
    }

    .flag > p {
        color: white;
        padding-top: 25px;
    }

    .flag > div {
        background-color: rgb(0, 40, 104);
        width: 100%;
        height: 300px;
        position: absolute;
        top: 150px;
    }

    .flag > div > div {
        background-color: white;
        width: 200px;
        height: 200px;
        position: absolute;
        top: 50px;
        left: 350px;
        border-radius: 50%;
    }
    
  </style>
</head>

<!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
-->

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
