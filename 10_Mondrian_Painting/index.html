<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
/*      I removed the extra elements using this solution.
      I didn't think you could use flexbox on the body too.*/

      body {
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 0;
          margin: 0;
      }

      .grid-container {
          background-color: black;
          width: 748px;
          height: 748px;
          display: grid;
          grid-template-rows: 414px 1fr 155px 20px;
          grid-template-columns: 320px 198px 153px 50px;
          gap: 9px;
      }

      .white1 {
          grid-column: span 3;
      }

      .white2 {
          grid-row: span 2;
      }

      .white3 {
          grid-column: span 2;
          grid-row: span 2;
      }

      .white4 {
          grid-row: span 2;
      }

      .red {
          background-color: #E72F24;
      }

      .white {
          background-color: #F0F1EC;
      }

      .blue {
          background-color: #004592;
          border-bottom: 10px solid black;
      }

      .yellow {
          background-color: #F9D01E;
      }

      .black {
          background-color: #232629;
      }


  </style>
</head>

<body>
    <div class="grid-container">
        <div class="red"></div>
        <div class="white white1"></div>

        <div class="white white2"></div>
        <div class="white white3"></div>
        <div class="blue"></div>
        <div class="white white4"></div>

        <div class="white white5"></div>
        <div class="yellow"></div>
        <div class="black"></div>
    </div>
  <!-- Write your HTML here -->
</body>

</html>
